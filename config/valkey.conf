# Valkey 9 configuration for Terminus All-in-One

bind 127.0.0.1
port 6379
timeout 0
tcp-keepalive 60
loglevel notice

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfilename "appendonly.aof"

dir /var/valkey

# Memory management
maxmemory 512mb
maxmemory-policy noeviction

# Require password (set via environment in entrypoint)
# requirepass is set dynamically by entrypoint.sh
