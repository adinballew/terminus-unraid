# ─────────────────────────────────────────────────────────────
# Supervisord config for Terminus All-in-One
# Manages: PostgreSQL 18, Valkey 9, Terminus web, Terminus worker
# ─────────────────────────────────────────────────────────────

[supervisord]
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
nodaemon=true

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

# ── PostgreSQL 18 (starts first) ──
[program:postgres]
command=/usr/lib/postgresql/18/bin/postgres -D /var/lib/postgresql/18/docker -c config_file=/var/lib/postgresql/18/docker/postgresql.conf
user=postgres
priority=10
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/var/log/postgres.log
stderr_logfile=/var/log/postgres.err.log

# ── Valkey 9 (starts second) ──
[program:valkey]
command=/usr/local/bin/valkey-server /etc/valkey/valkey.conf
user=valkey
priority=20
autostart=true
autorestart=true
startsecs=3
stdout_logfile=/var/log/valkey.log
stderr_logfile=/var/log/valkey.err.log

# ── Terminus Web (Hanami/Puma, starts after DB+Valkey) ──
[program:terminus-web]
command=bash -c "export $(cat /etc/terminus-env | xargs) && bundle exec puma --config ./config/puma.rb"
directory=/app
user=app
priority=30
autostart=true
autorestart=true
startsecs=10
stdout_logfile=/var/log/terminus-web.log
stderr_logfile=/var/log/terminus-web.err.log

# ── Terminus Worker (Sidekiq, starts after DB+Valkey) ──
[program:terminus-worker]
command=bash -c "export $(cat /etc/terminus-env | xargs) && bundle exec sidekiq -r ./config/sidekiq.rb"
directory=/app
user=app
priority=30
autostart=true
autorestart=true
startsecs=10
stdout_logfile=/var/log/terminus-worker.log
stderr_logfile=/var/log/terminus-worker.err.log
